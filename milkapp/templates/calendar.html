{% extends "index.html" %}
{% load static %}

{% block extra_css %}
    <link rel="stylesheet" href="{% static 'css/addmilkshift.css' %}">
    <link rel="stylesheet" href="{% static 'css/calendar.css' %}">
    <link rel="stylesheet" href="{% static 'css/shiftmodel.css' %}">
{% endblock %}

{% block calendar_content %}
    {% include "addmilkshift.html" %}
    {% include "shiftmodel.html" %}
    


    <div class="calendar-container">

        <div class="calendar-header">

            <button id="prevBtn">&lt;</button>

            <h2 id="monthYear"></h2>

            <button id="nextBtn">&gt;</button>

        </div>

        <div class="weekdays">
            <div>Sun</div>
            <div>Mon</div>
            <div>Tue</div>
            <div>Wed</div>
            <div>Thu</div>
            <div>Fri</div>
            <div>Sat</div>
        </div>

        <div id="calendar" class="calendar"></div>

      
    </div>
{% endblock %}

{% block extra_js %}
    <script type="module" src="{% static 'javascript/shiftmodel.js' %}"></script>
    <script type="module" src="{% static 'javascript/addmilkshift.js' %}"></script>
{% endblock %}
